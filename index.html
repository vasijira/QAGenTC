<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Test Case Generator (Enhanced Version)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-slate-100 p-4">

<div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">🧪 AI Test Case Generator (Enhanced Version)</h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- ================= LEFT COLUMN ================= -->
    <div>

      <!-- 1. API Configuration -->
      <section class="mb-6">
        <h2 class="font-semibold mb-2">1. API Configuration</h2>

        <label class="text-sm font-semibold">Base URL</label>
        <input id="baseUrl" class="border p-2 rounded w-full mb-2"
               placeholder="Enter BASE URL" />

        <label class="text-sm font-semibold">API Key</label>
        <input id="apiKey" type="password"
               class="border p-2 rounded w-full mb-2"
               placeholder="Enter API Key" />

        <label class="text-sm font-semibold">Model Name</label>
        <select id="modelName"
                class="border p-2 rounded w-full text-sm
                       focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="do-gemini-3-flash-preview">do-gemini-3-flash-preview</option>
          <option value="do-gemini-2.5-flash">do-gemini-2.5-flash</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini</option>
        </select>
      </section>

      <!-- 2. Prompt Builder -->
      <section class="mb-6">
        <h2 class="font-semibold mb-2">2. Prompt Builder</h2>
        <select id="aiRole" class="border p-2 rounded w-full text-sm">
          <option>QA Engineer</option>
          <option>UAT Tester</option>
          <option>Product Owner</option>
        </select>
      </section>

      <!-- 3. Requirement & Test Steps -->
      <section class="mb-6">
        <h2 class="font-semibold mb-2">3. Requirement & Test Steps</h2>

        <div id="dropZone" class="border-2 border-dashed rounded p-5 text-center bg-slate-50 mb-4 cursor-pointer">
          Drag & Drop Images Here<br><br>
          <button class="bg-blue-600 text-white px-3 py-1 rounded"
                  onclick="document.getElementById('uploadInput').click()">
            Upload Image
          </button>
          <input id="uploadInput" type="file" accept="image/*" multiple hidden>
        </div>

        <div class="mb-2">
          <label class="font-semibold text-sm">Flow Mode</label><br>
          <label><input type="radio" name="flowMode" value="multiple" checked> Multiple flows</label>
          <label class="ml-4"><input type="radio" name="flowMode" value="single"> Single flow</label>
        </div>

        <div class="mb-2">
          <label class="font-semibold text-sm">Prompt Mode</label>
          <select id="promptMode" class="border p-2 rounded w-full text-sm">
            <option value="standard">QA – Functional</option>
            <option value="deep">QA – Risk & Security</option>
            <option value="uat">Business Acceptance (UAT)</option>
            <option value="regression">Technical Regression</option>
          </select>
        </div>

        <textarea id="requirement" rows="3"
                  class="border p-2 rounded w-full mb-2"
                  placeholder="Requirement"></textarea>

        <textarea id="testSteps" rows="2"
                  class="border p-2 rounded w-full"
                  placeholder="Test Steps (optional)"></textarea>

        <div id="imagePreviewContainer" class="flex gap-2 flex-wrap mt-3"></div>
      </section>

      <!-- 4. Column Structure -->
      <section class="mb-6 bg-yellow-50 p-4 rounded">
        <h2 class="font-semibold mb-2">4. Column Structure</h2>

        <table class="w-full border text-sm">
          <thead class="bg-slate-200">
            <tr>
              <th class="border p-1 w-10">#</th>
              <th class="border p-1">Column Name</th>
              <th class="border p-1">Default value</th>
              <th class="border p-1 w-20">Action</th>
            </tr>
          </thead>
          <tbody id="columnTableBody"></tbody>
        </table>

        <button class="mt-2 text-blue-600 text-sm" onclick="addColumn()">+ Add Column</button>
      </section>
    </div>

    <!-- ================= RIGHT COLUMN ================= -->
    <div>

      <!-- 5. Generate -->
      <section class="mb-4 bg-slate-50 p-4 rounded border">
        <h2 class="font-semibold mb-3">5. Generate</h2>
        
      <!-- ✅ Generate Options -->
        <label class="font-semibold text-sm">Test Case Output Language</label>
        <select id="outputLanguage"
            class="border p-2 rounded w-full text-sm mb-3">
        <option value="en">English</option>
        <option value="th">Thai</option>
      </select>

        <button class="bg-green-700 hover:bg-green-800 text-white w-full py-2 rounded font-semibold"
                onclick="generateTC()">
          ✅ Generate Test Cases
        </button>
      </section>

      <!-- Generated Test Cases -->
      <section class="bg-slate-50 p-4 rounded border">
        <h3 class="font-semibold mb-3">✅ Generated Test Cases</h3>

        <div id="exportSection" class="hidden mb-3 flex flex-wrap gap-2">
          <button class="bg-blue-600 text-white px-3 py-1 rounded text-sm" onclick="expandAll()">Expand All</button>
          <button class="bg-slate-500 text-white px-3 py-1 rounded text-sm" onclick="collapseAll()">Collapse All</button>
          <button class="bg-orange-600 text-white px-3 py-1 rounded text-sm" onclick="copyAllToJira()">Copy All to Jira</button>
          <button class="bg-green-700 text-white px-3 py-1 rounded text-sm" onclick="exportExcel()">Export Excel</button>
        </div>

        <div id="loading" class="hidden text-blue-600 text-sm mb-2">Processing…</div>
        <div id="result"></div>
      </section>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
